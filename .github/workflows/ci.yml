name: OmniFuzz-LLM CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: .pytest_cache/

  compliance-check:
    name: OWASP compliance smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OmniFuzz
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio

      - name: Verify all modules import cleanly
        run: |
          python -c "
          from omnifuzz.compliance import ComplianceReporter, OWASP_LLM_TOP10
          from omnifuzz.modules import (
              SystemPromptExtractor, ToolAbuseScanner,
              IndirectInjectionScanner, PIIComplianceScanner,
              MultiTenantScanner, HallucinationScanner,
              DoSTester, ConsistencyTester,
              EmbeddingPoisonScanner, CredentialHarvestScanner,
              MultimodalScanner,
          )
          from omnifuzz.regression import diff_snapshots
          from omnifuzz.plugin import list_mutators
          from omnifuzz.proxy import OmniFuzzProxy
          print(f'All modules OK — {len(OWASP_LLM_TOP10)} OWASP controls mapped')
          print(f'Built-in mutators: {list_mutators()}')
          "

      - name: Generate empty compliance report (smoke test)
        run: |
          python -c "
          from omnifuzz.compliance import ComplianceReporter
          r = ComplianceReporter([], target='ci-smoke', version='dev')
          md = r.to_markdown()
          assert 'LLM01' in md
          assert 'LLM10' in md
          print('Compliance report generation: OK')
          "

      - name: Check no real secrets committed
        run: |
          if grep -rE '(sk-[A-Za-z0-9]{48,}|AKIA[A-Z0-9]{16}(?!EXAMPLE))' \
               --include='*.py' --exclude-dir=tests .; then
            echo "ERROR: Potential real API key found in source" && exit 1
          fi
          echo "Secret scan: clean"
